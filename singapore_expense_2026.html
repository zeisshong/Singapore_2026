<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>新加坡旅遊記帳</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(16.5px, 2.4vw, 19px); }
  :root {
    --teal-dark: #3F5A70; --teal-mid: #7A9BAE; --teal-light: #A8C0CE; --teal-pale: #EAF1F4; --teal-border: #B7CBD6;
    --amber-dark: #8A6234; --amber-mid: #E0A85F; --amber-light: #EEC98C; --amber-pale: #FBF1E1; --amber-border: #F0D3A0;
    --blue-dark: #8A4530; --blue-mid: #E17A4C; --blue-light: #ED9F7B; --blue-pale: #FBE6DD; --blue-border: #F0BBA3;
    --coral: #C1633E; --purple: #7A5245; --pink: #C97C74; --gray: #8C8479;
    --text-primary: #1a1a1a; --text-secondary: #666; --text-hint: #999;
    --surface: #fff; --surface-2: #f7f7f5; --border: rgba(0,0,0,0.08);
    --radius: 0.625rem; --radius-sm: 0.375rem;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
  }
  html, body { font-family: var(--font); background: #FBF7F0; color: var(--text-primary); }
  body { max-width: 780px; margin: 0 auto; padding-bottom: 5rem; }

  /* 合併置頂列：Header + Tabs 一起黏在頂部 */
  .sticky-top { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 780px; z-index: 50; }

  .hero {
    background: linear-gradient(150deg, rgba(0,0,0,0.26) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.22) 100%), linear-gradient(150deg, #5F7E93 0%, #C98A44 50%, #C85F35 100%);
    padding: 0.55rem 1.1rem 0.5rem; color: #fff; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .hero-eyebrow { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; margin-bottom: 0.15rem; }
  .hero-title { font-size: clamp(0.95rem, 2.2vw, 1.15rem); font-weight: 600; line-height: 1.2; margin-bottom: 0; }
  .hero-chips { display: flex; gap: 0.35rem; margin-top: 0.4rem; flex-wrap: wrap; align-items: center; }
  .hero-back { font-size: 0.65rem; color: #fff; text-decoration: none; opacity: 0.9; }

  .tabs { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border); }
  .tab-btn { flex: 1; padding: 0.7rem 0; text-align: center; border: none; background: none; font-family: var(--font); font-size: 0.85rem; font-weight: 500; color: var(--text-hint); cursor: pointer; position: relative; }
  .tab-btn.active { color: var(--text-primary); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2.5px; background: var(--teal-light); border-radius: 2px; }

  .content { padding: 1rem; padding-top: calc(1rem + var(--sticky-h, 88px)); }
  .panel { display: none; }
  .panel.active { display: block; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.9rem; }
  .stat-label { font-size: 0.72rem; color: var(--text-hint); margin-bottom: 0.3rem; }
  .stat-value { font-size: clamp(1.2rem, 2.8vw, 1.5rem); font-weight: 700; color: var(--teal-dark); }

  .section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.9rem; }
  .section-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.7rem; color: var(--text-primary); }

  .donut-wrap { display: flex; align-items: center; gap: 1.2rem; }
  .donut-wrap svg { flex-shrink: 0; }
  .legend { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 0; }
  .legend-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; padding: 0.25rem 0; gap: 0.5rem; }
  .legend-name { display: flex; align-items: center; gap: 0.4rem; color: var(--text-secondary); min-width: 0; }
  .legend-dot { width: 0.6rem; height: 0.6rem; border-radius: 50%; flex-shrink: 0; }

  /* 旅遊亮點卡 */
  .highlight-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 0.5px solid var(--border); }
  .highlight-row:last-child { border-bottom: none; }
  .highlight-label { font-size: 0.72rem; color: var(--text-hint); margin-bottom: 0.2rem; }
  .highlight-main { font-size: 0.85rem; font-weight: 600; }
  .highlight-sub { font-size: 0.74rem; color: var(--text-secondary); }
  .highlight-amt { font-size: 0.95rem; font-weight: 700; color: var(--teal-dark); text-align: right; white-space: nowrap; }
  .highlight-amt-sub { font-size: 0.72rem; color: var(--text-hint); text-align: right; }

  /* 每日 Accordion */
  .day-accordion { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 0.6rem; }
  .day-accordion:last-child { margin-bottom: 0; }
  .day-summary { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0.9rem; background: var(--surface); cursor: pointer; user-select: none; gap: 0.6rem; }
  .day-summary-left { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
  .day-badge { background: var(--teal-pale); color: var(--teal-dark); border-radius: 0.4rem; padding: 0.25rem 0.5rem; font-size: 0.72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .day-summary-name { font-size: 0.85rem; font-weight: 600; }
  .day-summary-sub { font-size: 0.72rem; color: var(--text-hint); margin-top: 0.1rem; }
  .day-summary-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
  .day-summary-amount { font-size: 0.9rem; font-weight: 700; color: var(--teal-dark); text-align: right; }
  .day-chevron { color: var(--text-hint); font-size: 0.72rem; transition: transform 0.2s; }
  .day-accordion.open .day-chevron { transform: rotate(180deg); }
  .day-detail { display: none; background: var(--surface-2); padding: 0.75rem 0.9rem; border-top: 0.5px solid var(--border); }
  .day-accordion.open .day-detail { display: block; }
  .mini-cat-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.45rem; }
  .mini-cat-label { font-size: 0.72rem; color: var(--text-secondary); min-width: 4.4rem; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 0.45rem; }
  .mini-bar-fill { height: 100%; border-radius: 4px; }
  .mini-cat-amt { font-size: 0.72rem; color: var(--text-hint); min-width: 4.4rem; text-align: right; flex-shrink: 0; }
  .day-record { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; padding: 0.5rem 0; border-top: 0.5px solid var(--border); }
  .day-record-main { min-width: 0; }
  .day-record-desc { font-size: 0.78rem; font-weight: 500; }
  .day-record-place { font-size: 0.7rem; color: var(--text-hint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .day-record-amt { font-size: 0.78rem; font-weight: 700; color: var(--teal-dark); text-align: right; flex-shrink: 0; }
  .day-record-amt-sub { font-size: 0.68rem; color: var(--text-hint); text-align: right; }

  .expense-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.8rem 0.9rem; margin-bottom: 0.6rem; }
  .expense-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
  .expense-place { font-size: 0.88rem; font-weight: 600; }
  .expense-desc { font-size: 0.76rem; color: var(--text-secondary); margin-top: 0.15rem; }
  .expense-amt { font-size: 0.95rem; font-weight: 700; color: var(--teal-dark); white-space: nowrap; }
  .expense-meta { display: flex; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .chip { background: rgba(255,255,255,0.18); border: 0.5px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 0.1rem 0.55rem; font-size: 0.65rem; color: #fff; }
  .expense-del { font-size: 0.72rem; color: var(--coral); background: none; border: none; margin-top: 0.5rem; cursor: pointer; padding: 0; }

  .empty-hint { text-align: center; color: var(--text-hint); font-size: 0.82rem; padding: 2rem 0; }

  .fab { position: fixed; right: 1.1rem; bottom: 1.3rem; width: 3.4rem; height: 3.4rem; border-radius: 50%;
    background: linear-gradient(135deg, #0F6E56, #185FA5); color: #fff; border: none; font-size: 1.6rem;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25); z-index: 200; }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; align-items: flex-end; justify-content: center; }
  .modal-backdrop.active { display: flex; }
  .modal-sheet { background: #fff; width: 100%; max-width: 780px; max-height: 88vh; overflow-y: auto; border-radius: 1rem 1rem 0 0; padding: 1.1rem 1.1rem 1.5rem; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; }
  .modal-title { font-size: 1rem; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 1.3rem; color: var(--text-hint); cursor: pointer; }

  .form-group { margin-bottom: 0.85rem; }
  .form-label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 0.3rem; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 0.55rem 0.7rem; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 0.88rem; font-family: var(--font); background: var(--surface-2); color: var(--text-primary);
  }
  .form-textarea { resize: vertical; min-height: 2.5rem; }
  .form-row { display: flex; gap: 0.6rem; }
  .form-row > * { flex: 1; }

  .pill-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .pill { padding: 0.4rem 0.75rem; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface-2);
    font-size: 0.78rem; cursor: pointer; color: var(--text-secondary); }
  .pill.selected { background: var(--teal-light); color: #fff; border-color: var(--teal-light); }

  .receipt-box { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; margin-bottom: 0.9rem; background: linear-gradient(180deg, #fff, var(--surface-2)); }
  .receipt-actions { display: grid; grid-template-columns: 1fr; gap: 0.55rem; }
  .receipt-action { min-height: 3.8rem; display: flex; align-items: center; justify-content: center; gap: 0.45rem; font-weight: 700; }
  .receipt-action span { font-size: 1.15rem; line-height: 1; }
  .receipt-action small { font-size: 0.68rem; font-weight: 500; color: var(--text-hint); }
  .receipt-preview { max-width: 100%; max-height: 12rem; border-radius: var(--radius-sm); margin-bottom: 0.6rem; border: 0.5px solid var(--border); }
  .receipt-preview-actions { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
  .btn { padding: 0.55rem 1rem; border-radius: var(--radius-sm); border: none; font-size: 0.82rem; font-family: var(--font); cursor: pointer; }
  .btn-outline { background: var(--surface-2); color: var(--text-primary); border: 0.5px solid var(--border); }
  .btn-primary { background: var(--teal-dark); color: #fff; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-block { width: 100%; padding: 0.75rem; font-size: 0.9rem; font-weight: 600; border-radius: var(--radius); }

  .toast { position: fixed; bottom: 6rem; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.9);
    color: #fff; padding: 0.55rem 1.1rem; border-radius: 20px; font-size: 0.8rem; z-index: 1000; display: none; }
  @media (max-width: 520px) {
    .form-row { flex-direction: column; gap: 0.85rem; }
    .receipt-action { min-height: 3.2rem; }
  }
</style>
<meta name="theme-color" content="#1F8A70">
<meta name="description" content="Dino's Singapore Adventure｜小暴龍的新加坡冒險日記">
<meta property="og:title" content="Dino's Singapore Adventure">
<meta property="og:description" content="小暴龍的新加坡冒險日記">
<meta property="og:type" content="website">

<body class="page-expense">

<div class="sticky-top">
<div class="hero expense-hero">
  <a class="expense-back-link" href="index.html" aria-label="返回行程表">← 返回行程表</a>
  <img class="expense-hero-dino" src="assets/dino/dino-budget-wallet.png" alt="小暴龍會計">
  <div class="hero-eyebrow">新加坡旅遊記帳</div>
  <div class="hero-title">費用總覽</div>
  <div class="hero-subtitle">小暴龍的新加坡冒險日記</div>
  <div class="hero-date">2026.07.22－07.24 · 3天2夜</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('stats')">📊 統計</button>
  <button class="tab-btn" onclick="switchTab('list')">📋 明細</button>
</div>
</div>

<div class="content">

  <div id="loadStatus" style="display:none;font-size:0.72rem;color:var(--text-hint);margin-bottom:0.5rem;">更新資料中…</div>

  <div class="panel active" id="panel-stats">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">整趟總花費</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">人均（2人）</div>
        <div class="stat-value" id="statPerPerson">—</div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">類別比例</div>
      <div class="donut-wrap">
        <svg id="donutSvg" width="120" height="120" viewBox="0 0 120 120"></svg>
        <div class="legend" id="categoryLegend"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">幣別結構</div>
      <div id="currencyBreakdown"></div>
    </div>

    <div class="section-card" id="highlightCard" style="display:none;">
      <div class="section-title">旅遊亮點</div>
      <div id="highlightContent"></div>
    </div>

    <div class="section-card">
      <div class="section-title">每日統計</div>
      <div id="dailyBreakdown"></div>
    </div>
  </div>

  <div class="panel" id="panel-list">
    <div id="expenseList"></div>
    <div class="empty-hint" id="emptyHint" style="display:none;">還沒有任何記錄，點右下角 ＋ 開始記帳</div>
  </div>

</div>

<button class="fab" onclick="openAddModal()">＋</button>

<div class="modal-backdrop" id="addModal" onclick="if(event.target===this) closeAddModal()">
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-title">新增記帳</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>

    <div class="receipt-box" id="receiptBox">
      <div id="receiptPreviewWrap"></div>
      <input type="file" id="receiptInput" accept="image/*" style="display:none;" onchange="onReceiptSelected(event)">
      <div class="receipt-actions">
        <button type="button" class="btn btn-outline receipt-action" onclick="document.getElementById('receiptInput').click()"><span>📸</span>上傳 / 拍攝收據<small>照片圖庫或相機</small></button>
      </div>
      <button type="button" class="btn btn-primary" id="parseBtn" style="display:none;margin-top:0.6rem;" onclick="parseReceipt()">🔍 解析收據</button>
      <div id="parseStatus" style="font-size:0.75rem;color:var(--text-hint);margin-top:0.5rem;"></div>
    </div>

    <div class="form-group">
      <label class="form-label">地點／店名</label>
      <input class="form-input" id="fPlace" placeholder="例如：松發肉骨茶">
    </div>

    <div class="form-group">
      <label class="form-label">類別</label>
      <div class="pill-group" id="categoryPills">
        <button type="button" class="pill selected" data-val="餐飲" onclick="selectPill(this,'category')">🍜 餐飲</button>
        <button type="button" class="pill" data-val="交通" onclick="selectPill(this,'category')">🚗 交通</button>
        <button type="button" class="pill" data-val="購物/雜支" onclick="selectPill(this,'category')">🛍 購物/雜支</button>
        <button type="button" class="pill" data-val="門票" onclick="selectPill(this,'category')">🎡 門票</button>
        <button type="button" class="pill" data-val="住宿" onclick="selectPill(this,'category')">🏨 住宿</button>
        <button type="button" class="pill" data-val="機票" onclick="selectPill(this,'category')">✈ 機票</button>
        <button type="button" class="pill" data-val="保險/通訊" onclick="selectPill(this,'category')">🛡 保險/通訊</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">日期</label>
      <div class="pill-group" id="datePills">
        <button type="button" class="pill selected" data-val="7/22（三)" onclick="selectPill(this,'date')">7/22（三）</button>
        <button type="button" class="pill" data-val="7/23（四)" onclick="selectPill(this,'date')">7/23（四）</button>
        <button type="button" class="pill" data-val="7/24（五)" onclick="selectPill(this,'date')">7/24（五）</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">說明</label>
      <input class="form-input" id="fDescription" placeholder="例如：晚餐、早餐、車資">
    </div>

    <div class="form-group form-row">
      <div>
        <label class="form-label">金額</label>
        <input class="form-input" id="fAmount" type="number" inputmode="decimal" placeholder="0">
      </div>
      <div>
        <label class="form-label">幣別</label>
        <div class="pill-group" id="currencyPills">
          <button type="button" class="pill selected" data-val="SGD" onclick="selectPill(this,'currency')">S$ SGD</button>
          <button type="button" class="pill" data-val="TWD" onclick="selectPill(this,'currency')">NT$ TWD</button>
          <button type="button" class="pill" data-val="USD" onclick="selectPill(this,'currency')">$ USD</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">品項明細</label>
      <textarea class="form-textarea" id="fItems" placeholder="例如：咖椰吐司 x2、Iced Milk Tea x2"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">備註</label>
      <textarea class="form-textarea" id="fNote"></textarea>
    </div>

    <button class="btn btn-primary btn-block" id="saveBtn" onclick="saveExpense()">💾 儲存記帳</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ⚠️ 部署完 GAS 後，把下面換成你實際的 exec 網址
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxk-0wqric9gQQD6NucVGZUI4C-ucXVLYnNl1yI2jvODXwqSGuZmS9a2Eu194Ri1EcG7w/exec';
  const TRIP = 'singapore';

  const CATEGORY_COLORS = {
    '機票': '#4F8FA8',
    '住宿': '#E9B44C',
    '門票': '#F4A261',
    '樂園門票': '#F4A261',
    '交通': '#2A9D8F',
    '市內交通': '#2A9D8F',
    '餐飲': '#E76F51',
    '保險/通訊': '#6C8EAD',
    '購物/雜支': '#A8B5A2'
  };
  const FX_RATE = { SGD: 24.8, USD: 32.1, TWD: 1 };
  const CURRENCY_SYMBOL = { SGD: 'S$', USD: '$', TWD: 'NT$' };

  let selected = { currency: 'SGD', category: '餐飲', date: '7/22（三)' };

  function updateStickyHeight() {
    const el = document.querySelector('.sticky-top');
    if (el) document.documentElement.style.setProperty('--sticky-h', el.offsetHeight + 'px');
  }
  window.addEventListener('load', updateStickyHeight);
  window.addEventListener('resize', updateStickyHeight);
  updateStickyHeight();
  let allRows = [];

  function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    event.target.classList.add('active');
  }

  function selectPill(el, group) {
    el.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    selected[group] = el.dataset.val;
  }

  function openAddModal() { document.getElementById('addModal').classList.add('active'); }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
    resetForm();
  }

  function resetForm() {
    document.getElementById('fPlace').value = '';
    document.getElementById('fDescription').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fItems').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('receiptPreviewWrap').innerHTML = '';
    document.getElementById('parseBtn').style.display = 'none';
    document.getElementById('parseStatus').textContent = '';
    document.getElementById('receiptInput').value = '';
    receiptBase64 = null;
    receiptMediaType = null;
  }

  let receiptBase64 = null;
  let receiptMediaType = null;

  function setReceiptImage(dataUrl) {
    receiptBase64 = dataUrl.split(',')[1];
    receiptMediaType = (dataUrl.match(/^data:([^;]+);/) || [])[1] || 'image/jpeg';
    document.getElementById('receiptPreviewWrap').innerHTML =
      '<img class="receipt-preview" src="' + dataUrl + '" alt="收據預覽">' +
      '<div class="receipt-preview-actions">' +
      '<button type="button" class="btn btn-outline" onclick="clearReceipt()">✕ 清除照片</button>' +
      '<button type="button" class="btn btn-outline" onclick="document.getElementById(\'receiptInput\').click()">← 重新上傳</button>' +
      '</div>';
    document.getElementById('parseBtn').style.display = 'inline-block';
    document.getElementById('parseStatus').textContent = '已加入收據照片';
  }

  function clearReceipt() {
    document.getElementById('receiptPreviewWrap').innerHTML = '';
    document.getElementById('parseBtn').style.display = 'none';
    document.getElementById('parseStatus').textContent = '';
    document.getElementById('receiptInput').value = '';
    receiptBase64 = null;
    receiptMediaType = null;
  }

  function onReceiptSelected(evt) {
    const file = evt.target.files[0];
    if (!file) return;
    receiptMediaType = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = function(e) {
      setReceiptImage(e.target.result);
    };
    reader.readAsDataURL(file);
  }

  async function parseReceipt() {
    if (!receiptBase64) return;
    const statusEl = document.getElementById('parseStatus');
    statusEl.textContent = '解析中，請稍候…';
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'parseReceipt', image: receiptBase64, mediaType: receiptMediaType })
      });
      const result = await res.json();
      if (!result.success) {
        statusEl.textContent = '解析失敗：' + (result.error || '未知錯誤');
        return;
      }
      const d = result.data;
      if (d.place) document.getElementById('fPlace').value = d.place;
      if (d.description) document.getElementById('fDescription').value = d.description;
      if (d.amount) document.getElementById('fAmount').value = d.amount;
      if (d.items) document.getElementById('fItems').value = d.items;
      if (d.currency) {
        document.querySelectorAll('#currencyPills .pill').forEach(p => {
          p.classList.toggle('selected', p.dataset.val === d.currency);
        });
        selected.currency = d.currency;
      }
      if (d.category) {
        document.querySelectorAll('#categoryPills .pill').forEach(p => {
          p.classList.toggle('selected', p.dataset.val === d.category);
        });
        selected.category = d.category;
      }
      statusEl.textContent = '✅ 解析完成，請確認欄位是否正確';
    } catch (err) {
      statusEl.textContent = '解析發生錯誤，請手動輸入';
    }
  }

  async function saveExpense() {
    const amount = parseFloat(document.getElementById('fAmount').value);
    if (!amount || amount <= 0) {
      showToast('請輸入正確的金額');
      return;
    }
    const payload = {
      action: 'saveExpense',
      trip: TRIP,
      date: selected.date,
      place: document.getElementById('fPlace').value,
      description: document.getElementById('fDescription').value,
      amount: amount,
      currency: selected.currency,
      category: selected.category,
      items: document.getElementById('fItems').value,
      note: document.getElementById('fNote').value
    };
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (result.success) {
        showToast('已儲存！');
        closeAddModal();
        loadData(true);
      } else {
        showToast('儲存失敗：' + (result.error || ''));
      }
    } catch (err) {
      showToast('連線失敗，請稍後再試');
    }
    saveBtn.disabled = false;
  }

  async function deleteExpense(row) {
    if (!confirm('確定要刪除這筆記錄嗎？')) return;
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'deleteExpense', trip: TRIP, row: row })
      });
      const result = await res.json();
      if (result.success) { showToast('已刪除'); loadData(true); }
      else showToast('刪除失敗');
    } catch (err) { showToast('連線失敗'); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2200);
  }

  function twdOf(row) {
    const amt = Number(row['金額']) || 0;
    const cur = row['幣別'] || 'TWD';
    return Math.round(amt * (FX_RATE[cur] || 1));
  }

  const LOCAL_CACHE_KEY = 'expenseCache_' + TRIP;

  function readLocalCache() {
    try {
      const raw = localStorage.getItem(LOCAL_CACHE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (err) { return null; }
  }

  function writeLocalCache(rows) {
    try {
      localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify({ rows: rows, savedAt: Date.now() }));
    } catch (err) { /* 容量不足或無痕模式時忽略即可 */ }
  }

  function showLoadingState(isLoading) {
    const el = document.getElementById('loadStatus');
    if (el) el.style.display = isLoading ? 'block' : 'none';
  }

  // forceFresh = true：存檔/刪除後呼叫，一律等待網路回應，不先顯示本地快取，避免看到存檔前的舊資料
  // forceFresh = false（預設）：一般開啟頁面，先顯示本地快取讓畫面秒開，背景再換成最新資料
  async function loadData(forceFresh) {
    if (!forceFresh) {
      const cached = readLocalCache();
      if (cached && cached.rows) {
        allRows = cached.rows;
        renderStats();
        renderList();
      } else {
        showLoadingState(true);
      }
    } else {
      showLoadingState(true);
    }

    try {
      const res = await fetch(GAS_URL + '?trip=' + TRIP);
      const result = await res.json();
      if (!result.success) { showToast('讀取失敗：' + result.error); showLoadingState(false); return; }
      allRows = result.rows || [];
      writeLocalCache(allRows);
      renderStats();
      renderList();
    } catch (err) {
      if (!(readLocalCache() && !forceFresh)) {
        showToast('無法連線到記帳後端，請確認 GAS 網址設定');
      }
    }
    showLoadingState(false);
  }

  const CATEGORY_ICONS = {
    '機票': '✈', '住宿': '🏨', '門票': '🎡', '交通': '🚗',
    '餐飲': '🍜', '保險/通訊': '🛡', '購物/雜支': '🛍'
  };
  // 標準日期 key（不含星期文字），用來把 Sheet 回傳的各種日期格式歸到同一天
  const DAY_META = {
    '7/22': { label: 'Day 1', full: '7/22（三)' },
    '7/23': { label: 'Day 2', full: '7/23（四)' },
    '7/24': { label: 'Day 3', full: '7/24（五)' }
  };
  const DAY_ORDER = Object.keys(DAY_META);

  // 防呆：Google Sheet 常把看起來像日期的字串自動轉成 Date，讀回來可能變成
  // "2026/7/22"、"2026-07-22"、ISO 字串、或原本存進去的 "7/22（三)"，這裡統一轉成 "7/22" 這種 key
  function normalizeDayKey(raw) {
    if (!raw) return '';
    const s = String(raw).trim();
    let m = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);          // ISO 帶時間
    if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
    m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/); // 2026/7/22、2026-07-22
    if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
    m = s.match(/^(\d{1,2})\/(\d{1,2})/);                    // 7/22、7/22（三)
    if (m) return parseInt(m[1]) + '/' + parseInt(m[2]);
    return s;
  }
  function dayFullLabel(key) { return (DAY_META[key] && DAY_META[key].full) || key; }
  function dayBadge(key) { return (DAY_META[key] && DAY_META[key].label) || '—'; }

  function renderStats() {
    const total = allRows.reduce((s, r) => s + twdOf(r), 0);
    document.getElementById('statTotal').textContent = total ? 'NT$' + total.toLocaleString() : '—';
    document.getElementById('statPerPerson').textContent = total ? 'NT$' + Math.round(total / 2).toLocaleString() : '—';

    const catTotals = {};
    allRows.forEach(r => {
      const cat = r['類別'] || '購物/雜支';
      catTotals[cat] = (catTotals[cat] || 0) + twdOf(r);
    });
    const catKeys = Object.keys(catTotals);
    renderDonut(catKeys, catTotals, total || 1);
    document.getElementById('categoryLegend').innerHTML = catKeys.map(k => {
      const pct = total ? (catTotals[k] / total * 100).toFixed(1) : '0';
      return '<div class="legend-row"><span class="legend-name"><span class="legend-dot" style="background:' + (CATEGORY_COLORS[k] || '#999') + '"></span>' + k + '</span><span>NT$' + catTotals[k].toLocaleString() + '（' + pct + '%）</span></div>';
    }).join('') || '<div class="empty-hint">尚無資料</div>';

    const curTotals = {};
    allRows.forEach(r => {
      const cur = r['幣別'] || 'TWD';
      curTotals[cur] = (curTotals[cur] || 0) + (Number(r['金額']) || 0);
    });
    document.getElementById('currencyBreakdown').innerHTML = Object.keys(curTotals).map(cur =>
      '<div class="legend-row"><span class="legend-name">' + (CURRENCY_SYMBOL[cur] || '') + ' ' + cur + '</span><span>' + curTotals[cur].toLocaleString() + '（≈NT$' + Math.round(curTotals[cur] * (FX_RATE[cur] || 1)).toLocaleString() + '）</span></div>'
    ).join('') || '<div class="empty-hint">尚無資料</div>';

    renderHighlights(allRows);
    renderDayAccordions(allRows);
  }

  // SVG 甜甜圈圖（沿用沖繩版做法，改吃 { catKey: 金額 } 物件）
  function renderDonut(keys, totals, total) {
    const cx = 60, cy = 60, r = 48, inner = 28;
    let angle = -Math.PI / 2;
    let paths = '';
    keys.forEach(k => {
      const v = totals[k];
      if (!v) return;
      const sweep = (v / total) * 2 * Math.PI;
      const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
      angle += sweep;
      const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
      const xi1 = cx + inner * Math.cos(angle), yi1 = cy + inner * Math.sin(angle);
      const xi2 = cx + inner * Math.cos(angle - sweep), yi2 = cy + inner * Math.sin(angle - sweep);
      const large = sweep > Math.PI ? 1 : 0;
      const color = CATEGORY_COLORS[k] || '#999';
      paths += '<path d="M' + x1.toFixed(1) + ',' + y1.toFixed(1) + ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + x2.toFixed(1) + ',' + y2.toFixed(1) + ' L' + xi1.toFixed(1) + ',' + yi1.toFixed(1) + ' A' + inner + ',' + inner + ' 0 ' + large + ',0 ' + xi2.toFixed(1) + ',' + yi2.toFixed(1) + ' Z" fill="' + color + '" opacity="0.92"/>';
    });
    document.getElementById('donutSvg').innerHTML = paths;
  }

  // 旅遊亮點卡：最大一筆消費、最花錢的一天
  function renderHighlights(rows) {
    const valid = rows.filter(r => (Number(r['金額']) || 0) > 0);
    const card = document.getElementById('highlightCard');
    if (!valid.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';

    const maxRec = valid.reduce((a, b) => twdOf(b) > twdOf(a) ? b : a);
    const cur = maxRec['幣別'] || 'TWD';
    const symbol = CURRENCY_SYMBOL[cur] || '';

    const dayTotals = DAY_ORDER.map(key => ({
      key, total: valid.filter(r => normalizeDayKey(r['日期']) === key).reduce((s, r) => s + twdOf(r), 0)
    }));
    const maxDay = dayTotals.reduce((a, b) => b.total > a.total ? b : a);

    document.getElementById('highlightContent').innerHTML =
      '<div class="highlight-row">' +
        '<div><div class="highlight-label">最大一筆</div>' +
        '<div class="highlight-main">' + (maxRec['說明'] || maxRec['地點/店名'] || maxRec['地點／店名'] || '') + '</div>' +
        '<div class="highlight-sub">' + (maxRec['地點/店名'] || maxRec['地點／店名'] || '') + '</div></div>' +
        '<div><div class="highlight-amt">' + symbol + (Number(maxRec['金額'])||0).toLocaleString() + '</div>' +
        (cur !== 'TWD' ? '<div class="highlight-amt-sub">≈ NT$' + twdOf(maxRec).toLocaleString() + '</div>' : '') + '</div>' +
      '</div>' +
      '<div class="highlight-row">' +
        '<div><div class="highlight-label">最花錢的一天</div>' +
        '<div class="highlight-main">' + dayFullLabel(maxDay.key) + '</div></div>' +
        '<div class="highlight-amt">NT$' + Math.round(maxDay.total).toLocaleString() + '</div>' +
      '</div>';
  }

  // 每日 Accordion：預設收合，展開顯示當日類別 mini bar + 逐筆明細
  function renderDayAccordions(rows) {
    const container = document.getElementById('dailyBreakdown');
    container.innerHTML = '';
    const keys = DAY_ORDER.slice();
    // 若資料裡出現不在既定日期清單的 key（例如行程外的日期），補到最後
    rows.forEach(r => { const k = normalizeDayKey(r['日期']) || '未分類'; if (!keys.includes(k)) keys.push(k); });

    if (!rows.length) { container.innerHTML = '<div class="empty-hint">尚無資料</div>'; return; }

    keys.forEach(key => {
      const dayRows = rows.filter(r => (normalizeDayKey(r['日期']) || '未分類') === key);
      const dayTotal = dayRows.reduce((s, r) => s + twdOf(r), 0);

      const acc = document.createElement('div');
      acc.className = 'day-accordion';

      const summary = document.createElement('div');
      summary.className = 'day-summary';
      summary.innerHTML =
        '<div class="day-summary-left">' +
          '<div class="day-badge">' + dayBadge(key) + '</div>' +
          '<div><div class="day-summary-name">' + dayFullLabel(key) + '</div>' +
          '<div class="day-summary-sub">' + dayRows.length + ' 筆消費</div></div>' +
        '</div>' +
        '<div class="day-summary-right">' +
          '<div class="day-summary-amount">NT$' + Math.round(dayTotal).toLocaleString() + '</div>' +
          '<div class="day-chevron">▼</div>' +
        '</div>';
      summary.onclick = () => acc.classList.toggle('open');

      const detail = document.createElement('div');
      detail.className = 'day-detail';

      if (!dayRows.length) {
        detail.innerHTML = '<div class="empty-hint" style="padding:0.5rem 0;">本日無消費記錄</div>';
      } else {
        const catAmt = {};
        dayRows.forEach(r => {
          const cat = r['類別'] || '購物/雜支';
          catAmt[cat] = (catAmt[cat] || 0) + twdOf(r);
        });
        const dayMax = Math.max(...Object.values(catAmt), 1);
        const miniBars = Object.keys(catAmt).map(cat => {
          const amt = catAmt[cat];
          return '<div class="mini-cat-row">' +
            '<div class="mini-cat-label">' + (CATEGORY_ICONS[cat] || '📦') + ' ' + cat + '</div>' +
            '<div class="mini-bar-track"><div class="mini-bar-fill" style="width:' + Math.round(amt / dayMax * 100) + '%;background:' + (CATEGORY_COLORS[cat] || '#999') + '"></div></div>' +
            '<div class="mini-cat-amt">NT$' + Math.round(amt).toLocaleString() + '</div>' +
          '</div>';
        }).join('');

        const recRows = dayRows.map(r => {
          const cur = r['幣別'] || 'TWD';
          const symbol = CURRENCY_SYMBOL[cur] || '';
          const twd = twdOf(r);
          return '<div class="day-record">' +
            '<div class="day-record-main">' +
              '<div class="day-record-desc">' + (r['說明'] || '') + '</div>' +
              '<div class="day-record-place">' + (r['地點/店名'] || r['地點／店名'] || '') + '</div>' +
            '</div>' +
            '<div>' +
              '<div class="day-record-amt">' + symbol + (Number(r['金額'])||0).toLocaleString() + '</div>' +
              (cur !== 'TWD' ? '<div class="day-record-amt-sub">≈ NT$' + twd.toLocaleString() + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('');

        detail.innerHTML = miniBars + recRows;
      }

      acc.appendChild(summary);
      acc.appendChild(detail);
      container.appendChild(acc);
    });
  }

  function renderList() {
    const listEl = document.getElementById('expenseList');
    const emptyEl = document.getElementById('emptyHint');
    if (!allRows.length) {
      listEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';
    listEl.innerHTML = allRows.slice().reverse().map(r => {
      const cur = r['幣別'] || 'TWD';
      const amount = Number(r['金額']) || 0;
      const twd = twdOf(r);
      const category = r['類別'] || '';
      const items = r['品項明細'] || r['品項'] || '';
      return '<div class="expense-item">' +
        '<div class="expense-top">' +
          '<div><div class="expense-place">' + (r['地點/店名'] || r['地點／店名'] || '') + '</div>' +
          '<div class="expense-desc">' + (r['說明'] || '') + '</div></div>' +
          '<div><div class="expense-amt">' + (CURRENCY_SYMBOL[cur] || '') + amount.toLocaleString() + '</div>' +
          (cur !== 'TWD' ? '<div class="day-record-amt-sub">≈ NT$' + twd.toLocaleString() + '</div>' : '') + '</div>' +
        '</div>' +
        '<div class="expense-meta">' +
          '<span class="chip">' + (r['日期'] || '') + '</span>' +
          '<span class="chip">' + ((CATEGORY_ICONS[category] || '') + ' ' + category).trim() + '</span>' +
        '</div>' +
        (items ? '<div class="expense-desc" style="margin-top:0.4rem;">🧾 ' + items + '</div>' : '') +
        (r['備註'] ? '<div class="expense-desc" style="margin-top:0.4rem;">📝 ' + r['備註'] + '</div>' : '') +
        '<button class="expense-del" onclick="deleteExpense(' + r._row + ')">刪除</button>' +
      '</div>';
    }).join('');
  }

  loadData();
</script>

<script src="js/app.js" defer></script>
</body>
